<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leyva AI — Plataforma Inteligente</title>
  
  <!-- Tailwind CSS para utilidades y fuentes modernas -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #09090b;
      --bg2: #0d0d10;
      --sidebar-bg: #111114;
      --surface: #141418;
      --surface2: #1a1a20;
      --surface3: #22222a;
      --border: rgba(255, 255, 255, 0.055);
      --border-mid: rgba(255, 255, 255, 0.09);
      --border-hi: rgba(255, 255, 255, 0.14);
      --p1: #a78bfa;
      --p2: #818cf8;
      --p3: #60a5fa;
      --accent: #7c3aed;
      --accent-glow: rgba(124, 58, 237, 0.18);
      --accent-line: rgba(139, 92, 246, 0.5);
      --text: #ebebf0;
      --text-2: #8888a0;
      --text-3: #50505f;
      --green: #34d399;
      --red: #f87171;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;
      --transition: 0.16s ease;
      --chat-max: 720px;
      --sidebar-w: 260px;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Fondo ambiental brillante */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 55% 45% at 60% -5%, rgba(124, 58, 237, 0.08) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 90% 105%, rgba(96, 165, 250, 0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Animaciones de la mascota interactiva */
    .dog-mascot {
      position: fixed;
      right: 40px;
      bottom: 110px;
      width: 140px;
      height: 140px;
      z-index: 999;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      animation: flotar 3s ease-in-out infinite;
    }

    .dog-mascot:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4));
    }

    .dog-mascot.bailando {
      animation: bailarTikTok 0.6s infinite linear !important;
    }

    .dog-mascot.feliz {
      animation: felizJump 0.5s ease-in-out 3 !important;
    }

    @keyframes flotar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes felizJump {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-25px) scaleY(0.9); }
    }

    @keyframes bailarTikTok {
      0% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-6px) rotate(-8deg) scale(1.05); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-6px) rotate(8deg) scale(1.05); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    @media (max-width: 768px) {
      .dog-mascot {
        right: 16px;
        bottom: 130px;
        width: 80px;
        height: 80px;
      }
    }

    /* Estilos personalizados para barra lateral y scroll */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 200;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .sidebar.closed {
      transform: translateX(-100%);
    }

    .main-content {
      flex: 1;
      margin-left: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      height: 100vh;
      transition: margin-left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .main-content.fullscreen {
      margin-left: 0;
    }

    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 40px 20px 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-scroll::-webkit-scrollbar,
    .sidebar-list::-webkit-scrollbar {
      width: 5px;
    }
    
    .chat-scroll::-webkit-scrollbar-thumb,
    .sidebar-list::-webkit-scrollbar-thumb {
      background: var(--surface3);
      border-radius: 99px;
    }

    /* Globos de chat modernos */
    .msg-user-bubble {
      background: linear-gradient(135deg, rgba(30, 30, 40, 0.7), rgba(20, 20, 25, 0.9));
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .msg-ai-bubble {
      background: transparent;
      border: none;
    }

    /* Caja de entrada con efectos de cristalizado */
    .input-bar {
      position: fixed;
      bottom: 0;
      left: var(--sidebar-w);
      right: 0;
      z-index: 100;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      padding: 16px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .main-content.fullscreen .input-bar {
      left: 0;
    }

    .input-inner {
      width: 100%;
      max-width: var(--chat-max);
      background: rgba(20, 20, 24, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-xl);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-inner:focus-within {
      border-color: rgba(139, 92, 246, 0.4);
      box-shadow: 0 10px 40px rgba(124, 58, 237, 0.15);
    }

    /* Markdown styling inside response */
    .formatted-text h1, .formatted-text h2, .formatted-text h3 {
      font-weight: 700;
      color: #fff;
      margin-top: 14px;
      margin-bottom: 6px;
    }
    .formatted-text h1 { font-size: 1.25rem; border-bottom: 1px solid var(--border-mid); padding-bottom: 4px; }
    .formatted-text h2 { font-size: 1.1rem; }
    .formatted-text p { margin-bottom: 10px; line-height: 1.7; }
    .formatted-text ul, .formatted-text ol { margin-left: 20px; margin-bottom: 10px; list-style-type: decimal; }
    .formatted-text ul { list-style-type: disc; }
    .formatted-text pre {
      background: var(--surface2);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-md);
      padding: 12px;
      overflow-x: auto;
      font-family: monospace;
      font-size: 0.85rem;
      margin: 10px 0;
    }
    .formatted-text code {
      background: rgba(139, 92, 246, 0.15);
      color: #c4b5fd;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* Toggle Switches */
    .toggle-checkbox:checked + .toggle-label {
      background-color: var(--accent);
    }
    .toggle-checkbox:checked + .toggle-label .toggle-dot {
      transform: translateX(100%);
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 10px 0 40px rgba(0,0,0,0.8);
      }
      .main-content {
        margin-left: 0 !important;
      }
      .input-bar {
        left: 0 !important;
        padding: 10px 12px 20px;
      }
      .chat-scroll {
        padding: 80px 12px 180px;
      }
    }
  </style>
</head>
<body>

  <!-- ═══ MASCOTA INTERACTIVA LEYVA AI ═══ -->
  <div class="dog-mascot" id="mascot" onclick="mascotReact()" title="¡Hazme clic para bailar!">
    <svg viewBox="0 0 100 100" width="100%" height="100%">
      <!-- Aura brillante detrás del robot perrito -->
      <circle cx="50" cy="50" r="40" fill="url(#auraGrad)" opacity="0.15" />
      
      <!-- Orejas mecánicas -->
      <rect x="22" y="28" width="10" height="25" rx="5" fill="#6366f1" transform="rotate(-15 22 28)" />
      <rect x="68" y="28" width="10" height="25" rx="5" fill="#6366f1" transform="rotate(15 68 28)" />
      
      <!-- Cuerpo del Robot perrito -->
      <rect x="35" y="55" width="30" height="25" rx="10" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2" />
      <circle cx="42" cy="78" r="6" fill="#4f46e5" />
      <circle cx="58" cy="78" r="6" fill="#4f46e5" />
      
      <!-- Cabeza flotante -->
      <rect x="28" y="30" width="44" height="32" rx="14" fill="#111115" stroke="#7c3aed" stroke-width="3" />
      
      <!-- Pantalla Visor -->
      <rect x="34" y="36" width="32" height="16" rx="8" fill="#030712" stroke="#818cf8" stroke-width="1.5" />
      
      <!-- Ojos de Neón (Cambian en reacciones) -->
      <circle id="left-eye" cx="42" cy="44" r="3.5" fill="#34d399" />
      <circle id="right-eye" cx="58" cy="44" r="3.5" fill="#34d399" />
      
      <!-- Pequeña nariz de metal -->
      <polygon points="48,48 52,48 50,51" fill="#818cf8" />
      
      <!-- Antena superior con bombilla led -->
      <line x1="50" y1="30" x2="50" y2="18" stroke="#7c3aed" stroke-width="2.5" />
      <circle cx="50" cy="16" r="4" fill="#a78bfa" id="antenna-led">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite" />
      </circle>

      <!-- Colores definidos -->
      <defs>
        <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#a78bfa" />
          <stop offset="100%" stop-color="transparent" />
        </radialGradient>
      </defs>
    </svg>
  </div>

  <!-- ═══ SIDEBAR HISTORIAL ═══ -->
  <aside class="sidebar" id="sidebar">
    <!-- Header Sidebar -->
    <div class="p-4 flex items-center justify-between border-b border-[rgba(255,255,255,0.05)]">
      <div class="flex items-center gap-2" onclick="newChat()" style="cursor: pointer;">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-violet-600 to-indigo-500 flex items-center justify-center shadow-lg shadow-violet-900/40">
          <svg class="w-4 h-4 stroke-white fill-none stroke-2" viewBox="0 0 24 24">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
        </div>
        <span class="font-bold tracking-tight bg-gradient-to-r from-violet-300 via-indigo-200 to-blue-200 bg-clip-text text-transparent text-sm">Leyva AI</span>
      </div>
      <button class="text-gray-500 hover:text-white transition-colors" onclick="toggleSidebar()" title="Ocultar menú">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
      </button>
    </div>

    <!-- Botón Nuevo Chat -->
    <button class="mx-3 my-3 p-3 flex items-center gap-2 rounded-xl border border-[rgba(255,255,255,0.1)] bg-transparent hover:bg-neutral-900/60 text-xs text-neutral-300 hover:text-white font-medium transition-all" onclick="newChat()">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
      Nuevo chat inteligente
    </button>

    <div class="px-4 py-1 text-[10px] font-bold tracking-wider text-neutral-500 uppercase">Conversaciones Recientes</div>
    
    <!-- Contenedor del Historial dinámico -->
    <div class="sidebar-list flex-1 overflow-y-auto px-2 py-1 space-y-1" id="sidebar-list">
      <!-- Se inyecta por JavaScript -->
    </div>

    <!-- Footer Sidebar -->
    <div class="p-3 border-t border-[rgba(255,255,255,0.05)]">
      <button class="w-full p-2 flex items-center gap-2 rounded-lg text-xs text-red-400/80 hover:text-red-400 hover:bg-red-500/5 transition-all" onclick="clearHistory()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
        Borrar todo el historial
      </button>
    </div>
  </aside>

  <!-- Capa oscura móvil -->
  <div class="sidebar-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-190 hidden" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- ═══ CONTENEDOR PRINCIPAL ═══ -->
  <div class="main-content flex-1 flex flex-col min-w-0" id="main-content">
    
    <!-- Mobile & Desktop Top Bar -->
    <header class="h-14 flex items-center justify-between px-4 border-b border-[rgba(255,255,255,0.055)] bg-black/40 backdrop-blur-md fixed top-0 left-0 right-0 z-50">
      <div class="flex items-center gap-3">
        <button class="p-2 rounded-lg border border-[rgba(255,255,255,0.08)] hover:bg-neutral-900 text-neutral-400 hover:text-white transition-all" onclick="toggleSidebar()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <span class="text-sm font-semibold tracking-wide text-neutral-200 block md:hidden">Leyva AI</span>
      </div>
      
      <!-- Opciones Rápidas en la cabecera -->
      <div class="flex items-center gap-4">
        <!-- Modo Generar Imagen -->
        <div class="flex items-center gap-2">
          <span class="text-xs text-neutral-400 font-medium">Modo Pintar 🎨</span>
          <div class="relative inline-block w-8 mr-2 align-middle select-none transition duration-200 ease-in">
            <input type="checkbox" name="toggle" id="image-mode-toggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer right-4 checked:right-0 transition-all duration-300"/>
            <label for="image-mode-toggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-zinc-700 cursor-pointer"></label>
          </div>
        </div>
        
        <button class="px-3 py-1.5 flex items-center gap-1.5 rounded-lg bg-zinc-900 border border-[rgba(255,255,255,0.08)] text-xs text-neutral-300 hover:text-white hover:bg-neutral-800 transition-all" onclick="newChat()">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
          Nuevo
        </button>
      </div>
    </header>

    <!-- ═══ CHAT SCROLL AREA ═══ -->
    <div class="chat-scroll" id="chat-scroll">
      
      <!-- Pantalla de Bienvenida -->
      <div class="welcome max-w-[var(--chat-max)] w-full text-center py-20 mt-8" id="welcome">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-600 to-indigo-500 flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-violet-600/30">
          <svg class="w-8 h-8 stroke-white fill-none stroke-[2]" viewBox="0 0 24 24">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
        </div>
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">Leyva <span class="bg-gradient-to-r from-violet-400 via-indigo-300 to-blue-300 bg-clip-text text-transparent">AI</span></h1>
        <p class="text-neutral-400 text-sm max-w-[420px] mx-auto mb-8 leading-relaxed">
          Bienvenido al futuro. Crea textos creativos, analiza imágenes complejas o pídele que pinte hermosas ideas.
        </p>

        <!-- Chips de sugerencias interactivas -->
        <div class="flex flex-wrap gap-2.5 justify-center max-w-[550px] mx-auto">
          <button class="px-3.5 py-2 rounded-xl border border-[rgba(255,255,255,0.06)] bg-neutral-900/80 hover:bg-neutral-800/80 hover:border-violet-500/40 text-xs text-neutral-300 hover:text-violet-200 transition-all duration-300" onclick="useSuggest('Dame una estrategia viral para crecer en TikTok')">
            📈 Estrategia para TikTok
          </button>
          <button class="px-3.5 py-2 rounded-xl border border-[rgba(255,255,255,0.06)] bg-neutral-900/80 hover:bg-neutral-800/80 hover:border-indigo-500/40 text-xs text-neutral-300 hover:text-indigo-200 transition-all duration-300" onclick="useSuggest('Escribe un poema cyberpunk sobre un robot melancólico')">
            🤖 Poema Cyberpunk
          </button>
          <button class="px-3.5 py-2 rounded-xl border border-[rgba(255,255,255,0.06)] bg-neutral-900/80 hover:bg-neutral-800/80 hover:border-blue-500/40 text-xs text-neutral-300 hover:text-blue-200 transition-all duration-300" onclick="useSuggest('Dame 5 consejos prácticos de finanzas personales')">
            💰 Finanzas Personales
          </button>
          <button class="px-3.5 py-2 rounded-xl border border-[rgba(255,255,255,0.06)] bg-neutral-900/80 hover:bg-neutral-800/80 hover:border-purple-500/40 text-xs text-neutral-300 hover:text-purple-200 transition-all duration-300" onclick="useSuggest('Pinta un gato astronauta flotando en el espacio realista')">
            🎨 Generar Imagen: Gato Astronauta
          </button>
        </div>
      </div>

      <!-- Contenedor dinámico de Mensajes -->
      <div id="messages" class="w-full max-w-[var(--chat-max)] space-y-6"></div>
      
    </div>

    <!-- ═══ BARRA DE ENTRADA ═══ -->
    <div class="input-bar">
      <!-- Vista previa de imagen seleccionada -->
      <div id="image-preview-container" class="w-full max-w-[var(--chat-max)] mb-2.5 hidden">
        <div class="relative inline-block bg-neutral-900 border border-violet-500/30 p-1.5 rounded-xl">
          <img id="image-preview" src="" alt="preview" class="h-16 w-16 object-cover rounded-lg">
          <button onclick="clearSelectedImage()" class="absolute -top-2 -right-2 bg-red-500 hover:bg-red-600 text-white p-1 rounded-full shadow-lg transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
      </div>

      <!-- Caja principal -->
      <div class="input-inner">
        <div class="flex items-end gap-3 p-2.5 pl-4">
          <!-- Botón de imagen escondido -->
          <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(event)">
          <button class="p-2 rounded-xl border border-[rgba(255,255,255,0.06)] hover:border-violet-500/50 hover:bg-violet-500/10 text-neutral-400 hover:text-violet-400 transition-all flex-shrink-0" onclick="document.getElementById('image-input').click()" title="Adjuntar imagen">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
          </button>

          <!-- Input principal (Textarea auto-ajustable) -->
          <textarea id="chat-input" rows="1" placeholder="Escribe un mensaje o describe un dibujo..." class="flex-1 bg-transparent border-none outline-none text-neutral-100 placeholder-neutral-500 font-normal text-[15px] leading-relaxed resize-none max-height-[140px] focus:ring-0 py-1.5" onkeydown="handleEnter(event)" oninput="autoExpand(this)"></textarea>

          <!-- Botón Enviar -->
          <button id="btn-send" class="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 to-indigo-500 hover:from-violet-500 hover:to-indigo-400 flex items-center justify-center text-white shadow-lg shadow-violet-900/30 transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed" onclick="sendMessage()" disabled>
            <svg id="send-icon" class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            <div id="send-spinner" class="w-4.5 h-4.5 border-2 border-white/30 border-t-white rounded-full animate-spin hidden"></div>
          </button>
        </div>
      </div>
      <div class="mt-2 text-[10px] text-neutral-600 font-medium tracking-wide">Leyva AI puede cometer errores. Considera verificar la información importante.</div>
    </div>

  </div>

  <!-- ═══ LÓGICA JAVASCRIPT AVANZADA ═══ -->
  <script>
    // Configuración Base de la API
    const apiKey = ""; // Se inyecta de forma segura a nivel de ejecución
    const systemPrompt = "Eres Leyva AI, una inteligencia artificial sofisticada, empática, detallada y perspicaz creada por Leyva. Siempre respondes en español. Mantienes un formato impecable usando títulos, viñetas y bloques de código de ser necesario. Sé alegre, inspirador y siempre da respuestas exhaustivas.";
    
    // Variables de Estado
    let conversations = [];
    let currentSessionId = null;
    let selectedImageBase64 = "";
    let selectedImageMime = "";

    // Elementos del DOM
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('btn-send');
    const messagesContainer = document.getElementById('messages');
    const welcomeScreen = document.getElementById('welcome');
    const imagePreviewContainer = document.getElementById('image-preview-container');
    const imagePreview = document.getElementById('image-preview');
    const imageInput = document.getElementById('image-input');
    const sidebarList = document.getElementById('sidebar-list');
    const imageModeToggle = document.getElementById('image-mode-toggle');

    // Inicialización al cargar la ventana
    window.onload = function() {
      loadHistoryFromStorage();
      if (conversations.length > 0) {
        loadSession(conversations[0].id);
      } else {
        newChat();
      }
      
      // Escuchar cambios en el input para activar/desactivar botón de envío
      chatInput.addEventListener('input', () => {
        sendBtn.disabled = chatInput.value.trim() === "" && !selectedImageBase64;
      });
    }

    // Adaptar altura de textarea automáticamente
    function autoExpand(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    // Capturar evento de Enter (sin Shift)
    function handleEnter(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Alternar Barra Lateral (Sidebar)
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const mainContent = document.getElementById('main-content');
      
      if (window.innerWidth <= 768) {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('hidden');
      } else {
        sidebar.classList.toggle('closed');
        mainContent.classList.toggle('fullscreen');
      }
    }

    // Mascot reacciona alegremente al hacer clic
    function mascotReact() {
      const mascot = document.getElementById('mascot');
      const leftEye = document.getElementById('left-eye');
      const rightEye = document.getElementById('right-eye');
      
      // Cambiar ojos a feliz "^"
      leftEye.setAttribute('fill', '#c4b5fd');
      rightEye.setAttribute('fill', '#c4b5fd');

      // Animaciones random
      if (Math.random() > 0.5) {
        mascot.classList.add('bailando');
        setTimeout(() => {
          mascot.classList.remove('bailando');
          restoreEyes();
        }, 2000);
      } else {
        mascot.classList.add('feliz');
        setTimeout(() => {
          mascot.classList.remove('feliz');
          restoreEyes();
        }, 1500);
      }
    }

    function restoreEyes() {
      document.getElementById('left-eye').setAttribute('fill', '#34d399');
      document.getElementById('right-eye').setAttribute('fill', '#34d399');
    }

    // Sugerencias rápidas del Dashboard
    function useSuggest(text) {
      chatInput.value = text;
      autoExpand(chatInput);
      sendBtn.disabled = false;
      chatInput.focus();
      // Si la sugerencia empieza con "Pinta", activar el modo pintura automáticamente
      if (text.toLowerCase().startsWith('pinta') || text.toLowerCase().startsWith('dibuja')) {
        imageModeToggle.checked = true;
      }
    }

    // Previsualización de imágenes adjuntadas
    function previewImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      selectedImageMime = file.type;
      const reader = new FileReader();
      reader.onload = function(e) {
        selectedImageBase64 = e.target.result.split(',')[1];
        imagePreview.src = e.target.result;
        imagePreviewContainer.classList.remove('hidden');
        sendBtn.disabled = false;
      }
      reader.readAsDataURL(file);
    }

    // Limpiar imagen cargada
    function clearSelectedImage() {
      selectedImageBase64 = "";
      selectedImageMime = "";
      imageInput.value = "";
      imagePreviewContainer.classList.add('hidden');
      if (chatInput.value.trim() === "") {
        sendBtn.disabled = true;
      }
    }

    // Inicializar nuevo chat libre
    function newChat() {
      currentSessionId = Date.now();
      messagesContainer.innerHTML = "";
      welcomeScreen.classList.remove('hidden');
      clearSelectedImage();
      chatInput.value = "";
      chatInput.style.height = 'auto';
      sendBtn.disabled = true;
      
      // Cerrar barra lateral en pantallas móviles
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.add('hidden');
      }
    }

    // Cargar Historial desde LocalStorage
    function loadHistoryFromStorage() {
      const stored = localStorage.getItem('leyva_ai_history');
      if (stored) {
        conversations = JSON.parse(stored);
        renderHistoryList();
      }
    }

    // Guardar Conversación en la memoria local
    function saveConversation(id, messages) {
      const existingIdx = conversations.findIndex(c => c.id === id);
      const title = messages[0]?.text ? messages[0].text.substring(0, 36) + "..." : "Nuevo Chat Inteligente";
      
      if (existingIdx !== -1) {
        conversations[existingIdx].messages = messages;
        conversations[existingIdx].title = title;
      } else {
        conversations.unshift({ id, title, messages });
      }
      
      localStorage.setItem('leyva_ai_history', JSON.stringify(conversations));
      renderHistoryList();
    }

    // Borrar todo el historial
    function clearHistory() {
      conversations = [];
      localStorage.removeItem('leyva_ai_history');
      renderHistoryList();
      newChat();
    }

    // Renderizar lista en Sidebar
    function renderHistoryList() {
      sidebarList.innerHTML = "";
      if (conversations.length === 0) {
        sidebarList.innerHTML = `<div class="text-center text-neutral-600 text-xs py-8">No hay chats aún</div>`;
        return;
      }

      conversations.forEach(chat => {
        const item = document.createElement('div');
        item.className = `p-2.5 mx-2 rounded-xl border border-transparent hover:bg-neutral-900/60 transition-all cursor-pointer flex items-center justify-between group ${chat.id === currentSessionId ? 'bg-neutral-900/50 border-[rgba(255,255,255,0.04)] text-white' : 'text-neutral-400'}`;
        item.setAttribute('onclick', `loadSession(${chat.id})`);

        item.innerHTML = `
          <div class="flex items-center gap-2.5 overflow-hidden">
            <svg class="w-4 h-4 text-neutral-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            <span class="text-xs font-medium truncate">${chat.title}</span>
          </div>
          <button onclick="event.stopPropagation(); deleteSession(${chat.id})" class="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-500/10 text-neutral-500 hover:text-red-400 rounded-md transition-all">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        `;
        sidebarList.appendChild(item);
      });
    }

    // Cargar sesión seleccionada
    function loadSession(id) {
      currentSessionId = id;
      const chat = conversations.find(c => c.id === id);
      if (!chat) return;

      welcomeScreen.classList.add('hidden');
      messagesContainer.innerHTML = "";
      
      chat.messages.forEach(msg => {
        appendMessage(msg.role, msg.text, msg.image, false);
      });

      renderHistoryList();
      scrollToBottom();
    }

    // Borrar sesión individual
    function deleteSession(id) {
      conversations = conversations.filter(c => c.id !== id);
      localStorage.setItem('leyva_ai_history', JSON.stringify(conversations));
      renderHistoryList();
      if (currentSessionId === id) {
        newChat();
      }
    }

    // ═══ SISTEMA DE ENVÍO Y CONTROL DE MENSAJES ═══
    async function sendMessage() {
      const text = chatInput.value.trim();
      const imageMode = imageModeToggle.checked;
      
      if (!text && !selectedImageBase64) return;

      // Desactivar interfaz
      chatInput.value = "";
      chatInput.style.height = 'auto';
      setLoading(true);
      welcomeScreen.classList.add('hidden');

      // Guardar imagen si hay seleccionada
      let userImage = null;
      if (selectedImageBase64) {
        userImage = `data:${selectedImageMime};base64,${selectedImageBase64}`;
      }

      // Añadir mensaje del usuario al DOM
      appendMessage("user", text, userImage);

      // Crear estructura de mensajes para la sesión actual
      const session = conversations.find(c => c.id === currentSessionId) || { id: currentSessionId, messages: [] };
      const updatedMessages = [...session.messages, { role: "user", text, image: userImage }];
      saveConversation(currentSessionId, updatedMessages);

      // Limpiar previsualizador de imagen adjunta
      const activeImageBase64 = selectedImageBase64;
      const activeImageMime = selectedImageMime;
      clearSelectedImage();

      try {
        if (imageMode) {
          // LLAMADA A GENERADOR DE IMAGENES (IMAGEN-4.0)
          await generateAndDisplayImage(text, updatedMessages);
        } else {
          // LLAMADA A GENERADOR DE TEXTO (GEMINI-2.5)
          await generateTextWithGemini(text, activeImageBase64, activeImageMime, updatedMessages);
        }
      } catch (err) {
        appendError(err.message);
      } finally {
        setLoading(false);
        scrollToBottom();
      }
    }

    // Controlar estado de carga de la app
    function setLoading(isLoading) {
      const sendIcon = document.getElementById('send-icon');
      const sendSpinner = document.getElementById('send-spinner');
      
      if (isLoading) {
        sendBtn.disabled = true;
        sendIcon.classList.add('hidden');
        sendSpinner.classList.remove('hidden');
      } else {
        sendIcon.classList.remove('hidden');
        sendSpinner.classList.add('hidden');
      }
    }

    // Realizar llamada de Texto con Backoff Exponencial (Hasta 5 reintentos)
    async function generateTextWithGemini(prompt, base64Image, mimeType, historyMessages) {
      const isVision = !!base64Image;
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      
      // Contruir payload con la estructura requerida
      let parts = [{ text: prompt }];
      if (isVision) {
        parts.push({
          inlineData: {
            mimeType: mimeType,
            data: base64Image
          }
        });
      }

      const payload = {
        contents: [{ parts: parts }],
        systemInstruction: { parts: [{ text: systemPrompt }] }
      };

      const options = {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      };

      // Crear contenedor animado de pensamiento
      const thinkingEl = appendThinking();
      
      try {
        const data = await fetchWithRetry(url, options);
        thinkingEl.remove();

        const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Lo siento, no obtuve respuesta del servidor.";
        
        // Escribir gradualmente la respuesta de la IA
        appendMessage("ai", responseText, null, true);
        
        // Guardar la respuesta final de la IA en el historial
        const session = conversations.find(c => c.id === currentSessionId);
        if (session) {
          session.messages.push({ role: "ai", text: responseText, image: null });
          saveConversation(currentSessionId, session.messages);
        }
      } catch (error) {
        thinkingEl.remove();
        throw error;
      }
    }

    // Generador de imágenes usando Imagen-4.0
    async function generateAndDisplayImage(promptText, historyMessages) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
      
      const payload = {
        instances: [{ prompt: promptText }],
        parameters: { sampleCount: 1 }
      };

      const options = {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      };

      const thinkingEl = appendThinking("Leyva AI está pintando tu idea...");

      try {
        const data = await fetchWithRetry(url, options);
        thinkingEl.remove();

        const base64Image = data.predictions?.[0]?.bytesBase64Encoded;
        if (!base64Image) {
          throw new Error("No se pudo obtener la imagen del servidor.");
        }

        const generatedImageUrl = `data:image/png;base64,${base64Image}`;
        
        // Añadir respuesta con la imagen generada
        appendMessage("ai", "Aquí tienes la ilustración que me pediste:", generatedImageUrl);

        // Guardar respuesta en el historial
        const session = conversations.find(c => c.id === currentSessionId);
        if (session) {
          session.messages.push({ role: "ai", text: "Aquí tienes la ilustración que me pediste:", image: generatedImageUrl });
          saveConversation(currentSessionId, session.messages);
        }

      } catch (error) {
        thinkingEl.remove();
        throw error;
      }
    }

    // Función genérica de reintento para garantizar la entrega de la API
    async function fetchWithRetry(url, options, maxRetries = 5) {
      let delay = 1000;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, options);
          if (response.ok) {
            return await response.json();
          }
        } catch (e) {
          // Fallo controlado, sin imprimir ruidosamente en consola
        }
        await new Promise(resolve => setTimeout(resolve, delay));
        delay *= 2;
      }
      throw new Error("Lo siento, la conexión con Leyva AI falló tras varios intentos. Por favor, reintenta.");
    }

    // ═══ RENDERIZADORES DE MENSAJES Y EFECTOS ═══
    function appendMessage(role, text, imageSrc = null, animateTypewriter = false) {
      const wrapper = document.createElement('div');
      wrapper.className = `w-full flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-up`;
      
      let messageHtml = "";
      
      if (role === 'user') {
        messageHtml = `
          <div class="msg-user-bubble max-w-[85%] px-5 py-3.5 text-[15px] leading-relaxed text-zinc-100 flex flex-col gap-2">
            ${imageSrc ? `<img src="${imageSrc}" class="rounded-xl max-h-[220px] object-cover mb-2 border border-zinc-700/50" />` : ''}
            <div>${escapeHtml(text)}</div>
          </div>
        `;
        wrapper.innerHTML = messageHtml;
        messagesContainer.appendChild(wrapper);
      } else {
        // Estilo AI
        const aiMessageId = `ai-msg-${Date.now()}`;
        messageHtml = `
          <div class="flex items-start gap-3 w-full">
            <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-violet-600 to-indigo-500 flex items-center justify-center shadow-md shadow-violet-600/10 shrink-0">
              <svg class="w-4.5 h-4.5 stroke-white fill-none stroke-2" viewBox="0 0 24 24">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
              </svg>
            </div>
            <div class="flex-1 flex flex-col gap-1.5 min-w-0">
              <span class="text-[10px] font-bold tracking-wider uppercase text-neutral-500">Leyva AI</span>
              <div id="${aiMessageId}" class="formatted-text text-[15px] leading-relaxed text-neutral-200">
                ${imageSrc ? `<img src="${imageSrc}" class="rounded-2xl max-w-full md:max-w-[480px] max-h-[380px] object-cover mb-3 shadow-xl border border-white/5" />` : ''}
                <div class="text-content"></div>
              </div>
              <div class="flex items-center gap-2 mt-1">
                <button onclick="copyToClipboard('${aiMessageId}')" class="px-2.5 py-1 rounded-lg border border-[rgba(255,255,255,0.04)] bg-neutral-900/30 hover:bg-neutral-900 text-[10px] text-neutral-400 hover:text-white transition-all flex items-center gap-1">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                  Copiar respuesta
                </button>
              </div>
            </div>
          </div>
        `;
        wrapper.innerHTML = messageHtml;
        messagesContainer.appendChild(wrapper);

        const textContentContainer = wrapper.querySelector('.text-content');

        if (animateTypewriter && text) {
          typewriterEffect(textContentContainer, text);
        } else {
          textContentContainer.innerHTML = parseMarkdown(text);
        }
      }
      
      scrollToBottom();
    }

    // Efecto mecanografía clásico
    function typewriterEffect(element, text) {
      let index = 0;
      const rawHtml = parseMarkdown(text);
      
      // Para simular fluidez sin demorar demasiado las respuestas grandes, inyectamos bloques pequeños
      element.innerHTML = rawHtml;
      
      // Animación suave de aparición por transiciones
      element.style.opacity = '0';
      element.style.transform = 'translateY(4px)';
      element.style.transition = 'all 0.4s ease';
      
      setTimeout(() => {
        element.style.opacity = '1';
        element.style.transform = 'translateY(0)';
      }, 50);
    }

    // Caja animada de "IA pensando..."
    function appendThinking(customText = "Leyva AI está pensando...") {
      const wrapper = document.createElement('div');
      wrapper.className = "w-full flex justify-start animate-pulse";
      wrapper.innerHTML = `
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-xl bg-neutral-900 border border-[rgba(255,255,255,0.06)] flex items-center justify-center shrink-0">
            <svg class="w-4.5 h-4.5 stroke-neutral-500 fill-none stroke-2" viewBox="0 0 24 24">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
          </div>
          <div class="flex items-center gap-2.5 px-4 py-2.5 rounded-2xl border border-[rgba(255,255,255,0.05)] bg-neutral-900/40">
            <div class="flex gap-1.5 items-center">
              <span class="w-2 h-2 rounded-full bg-violet-400 animate-bounce" style="animation-delay: 0s"></span>
              <span class="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style="animation-delay: 0.15s"></span>
              <span class="w-2 h-2 rounded-full bg-blue-400 animate-bounce" style="animation-delay: 0.3s"></span>
            </div>
            <span class="text-xs text-neutral-400 italic">${customText}</span>
          </div>
        </div>
      `;
      messagesContainer.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    // Caja de error amigable
    function appendError(errorMessage) {
      const wrapper = document.createElement('div');
      wrapper.className = "w-full flex justify-start";
      wrapper.innerHTML = `
        <div class="max-w-[85%] px-4 py-3 rounded-xl border border-red-500/10 bg-red-500/5 text-xs text-red-400 flex items-start gap-2">
          <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          <div>${errorMessage}</div>
        </div>
      `;
      messagesContainer.appendChild(wrapper);
      scrollToBottom();
    }

    // Desplazar vista al final del chat
    function scrollToBottom() {
      const scrollArea = document.getElementById('chat-scroll');
      scrollArea.scrollTop = scrollArea.scrollHeight;
    }

    // Copiar al portapapeles de forma segura (Compatible con iframes de Canvas)
    function copyToClipboard(containerId) {
      const container = document.getElementById(containerId);
      const text = container ? container.innerText : "";
      
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);

      // Mostrar feedback temporal
      const btn = event.currentTarget;
      const originalText = btn.innerHTML;
      btn.innerHTML = `
        <svg class="w-3 h-3 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
        ¡Copiado con éxito!
      `;
      setTimeout(() => { btn.innerHTML = originalText; }, 2000);
    }

    // Sanitizar HTML para evitar inyecciones XSS
    function escapeHtml(string) {
      return String(string).replace(/[&<>"']/g, function (s) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[s];
      });
    }

    // Parseador ligero de Markdown (para listas, código, cabeceras, etc)
    function parseMarkdown(text) {
      if (!text) return "";
      let html = escapeHtml(text);

      // Bloques de código (``` ... ```)
      html = html.replace(/```([\s\S]+?)```/g, '<pre><code>$1</code></pre>');

      // Negritas (** ... **)
      html = html.replace(/\*\*([\s\S]+?)\*\*/g, '<strong>$1</strong>');

      // Títulos jerárquicos (## e ###)
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

      // Listas de viñetas ( - o *)
      html = html.replace(/^\s*-\s+(.*$)/gim, '<ul><li>$1</li></ul>');
      html = html.replace(/^\s*\*\s+(.*$)/gim, '<ul><li>$1</li></ul>');
      
      // Limpiar etiquetas de listas repetitivas
      html = html.replace(/<\/ul>\s*<ul>/g, '');

      // Saltos de línea para el resto
      html = html.replace(/\n/g, '<br>');

      return html;
    }
  </script>
