    <style>
  .dog-mascot{
  position: fixed;
  right: 55px;
  bottom: 95px;
  width:  180px;
  height: 180px;
  z-index: 9999;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dog-mascot img{
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: none;
}

.dog-mascot.bailando{
  animation: bailar 0.45s infinite;
}

.dog-mascot.feliz{
  animation: feliz 0.6s ease-in-out 4;
}
@media (max-width: 600px){

  .dog-mascot{
    right: 20px;
    bottom: 115px;
    width: 96px;
    height: 96px;
  }

  .dog-mascot img{
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: none;
  }

}

  @keyframes flotarMovil{
    0%{
      transform: translateY(0px);
    }

    50%{
      transform: translateY(-8px);
    }

    100%{
      transform: translateY(0px);
    }
  }
}
@keyframes flotar{
  0%,100%{
    transform: translateY(0);
  }

  50%{
    transform: translateY(-10px);
  }
}

@keyframes bailarTikTok {

  0%{
    transform: translateY(0px) rotate(0deg);
  }

  10%{
    transform: translateY(-10px) rotate(-10deg);
  }

  20%{
    transform: translateY(0px) rotate(10deg);
  }

  30%{
    transform: translateY(-10px) rotate(-10deg);
  }

  40%{
    transform: translateY(0px) rotate(10deg);
  }

  50%{
    transform: scale(1.06) translateY(-12px);
  }

  60%{
    transform: translateY(0px) rotate(-10deg);
  }

  70%{
    transform: translateY(-10px) rotate(10deg);
  }

  80%{
    transform: translateY(0px) rotate(-10deg);
  }

  90%{
    transform: translateY(-10px) rotate(10deg);
  }

  100%{
    transform: translateY(0px) rotate(0deg);
  }
}
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }


#toggle-history {
  background: transparent;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
  margin-bottom: 10px;
    }

    .hidden-history {
  transform: translateX(-100%);
  transition: 0.3s;
}

      /* ── Remove Replit badge — capa CSS (primera línea de defensa) ── */
      #__replco,
      [data-replit-badge],
      .replit-ui-theme-root > div[style*="position: fixed"][style*="bottom"],
      iframe[src*="replit.com/badge"],
      div[style*="replit"],
      a[href*="replit.com/badge"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
      }

      :root {
        --bg: #09090b;
        --bg2: #0d0d10;
        --sidebar-bg: #111114;
        --surface: #141418;
        --surface2: #1a1a20;
        --surface3: #22222a;
        --border: rgba(255, 255, 255, 0.055);
        --border-mid: rgba(255, 255, 255, 0.09);
        --border-hi: rgba(255, 255, 255, 0.14);
        --p1: #a78bfa;
        --p2: #818cf8;
        --p3: #60a5fa;
        --accent: #7c3aed;
        --accent-glow: rgba(124, 58, 237, 0.18);
        --accent-line: rgba(139, 92, 246, 0.5);
        --text: #ebebf0;
        --text-2: #8888a0;
        --text-3: #50505f;
        --green: #34d399;
        --red: #f87171;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 18px;
        --radius-xl: 24px;
        --transition: 0.16s ease;
        --chat-max: 680px;
        --sidebar-w: 248px;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      /* ── Ambient glow ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 55% 45% at 60% -5%,
            rgba(124, 58, 237, 0.06) 0%,
            transparent 65%
          ),
          radial-gradient(
            ellipse 40% 30% at 90% 105%,
            rgba(96, 165, 250, 0.03) 0%,
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* ════════════════════════════
       SIDEBAR
    ════════════════════════════ */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: var(--sidebar-w);
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 200;
        transition: transform 0.25s ease;
        overflow: hidden;
      }

      /* ── Sidebar brand ── */
      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 18px 16px 14px;
        cursor: pointer;
        flex-shrink: 0;
        border-radius: 0;
        transition: opacity var(--transition);
      }

      .sidebar-brand:hover {
        opacity: 0.8;
      }

      .brand-orb {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(
          135deg,
          #7c3aed 0%,
          #6366f1 55%,
          #3b82f6 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 14px rgba(124, 58, 237, 0.32);
        flex-shrink: 0;
      }

      .brand-orb svg {
        width: 13px;
        height: 13px;
        fill: none;
        stroke: #fff;
        stroke-width: 2.3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .brand-name {
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, #c4b5fd, #a5b4fc, #93c5fd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── New chat button ── */
      .sidebar-new-chat {
        margin: 0 10px 12px;
        padding: 9px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: none;
        border: 1px solid var(--border-mid);
        border-radius: var(--radius-md);
        color: var(--text-2);
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background var(--transition),
          border-color var(--transition),
          color var(--transition);
        flex-shrink: 0;
        text-align: left;
      }

      .sidebar-new-chat:hover {
        background: var(--surface);
        border-color: var(--border-hi);
        color: var(--text);
      }

      .sidebar-new-chat svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        flex-shrink: 0;
      }

      /* ── History section ── */
      .sidebar-section-label {
        font-size: 0.64rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-3);
        padding: 0 16px 8px;
        flex-shrink: 0;
      }

      .sidebar-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 8px;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .sidebar-list::-webkit-scrollbar {
        width: 3px;
      }
      .sidebar-list::-webkit-scrollbar-thumb {
        background: var(--surface3);
        border-radius: 3px;
      }

      .sidebar-empty {
        text-align: center;
        color: var(--text-3);
        font-size: 0.75rem;
        padding: 24px 16px;
        line-height: 1.5;
      }

      .history-item {
        padding: 8px 10px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          background var(--transition),
          border-color var(--transition);
        position: relative;
      }

      .history-item:hover {
        background: var(--surface);
        border-color: var(--border);
      }

      .history-item.active {
        background: var(--surface2);
        border-color: var(--border-mid);
      }

      .history-item-topic {
        font-size: 0.8rem;
        font-weight: 400;
        color: var(--text-2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.4;
      }

      .history-item:hover .history-item-topic,
      .history-item.active .history-item-topic {
        color: var(--text);
      }

      .history-item-date {
        font-size: 0.64rem;
        color: var(--text-3);
        margin-top: 2px;
      }

      /* ── Sidebar footer ── */
      .sidebar-footer {
        padding: 10px 10px 14px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .btn-clear-history {
        width: 100%;
        padding: 7px 12px;
        background: none;
        border: none;
        border-radius: var(--radius-sm);
        color: var(--text-3);
        font-family: inherit;
        font-size: 0.74rem;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition:
          color var(--transition),
          background var(--transition);
        text-align: left;
      }

      .btn-clear-history:hover {
        color: var(--red);
        background: rgba(248, 113, 113, 0.06);
      }

      .btn-clear-history svg {
        width: 13px;
        height: 13px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ════════════════════════════
       MOBILE TOPBAR
    ════════════════════════════ */
      .mobile-topbar {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        background: rgba(9, 9, 11, 0.9);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border);
        z-index: 300;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
      }

      .mobile-topbar .brand-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mobile-brand-name {
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, #c4b5fd, #a5b4fc, #93c5fd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .btn-hamburger {
        background: none;
        border: 1px solid var(--border-mid);
        border-radius: var(--radius-sm);
        color: var(--text-2);
        cursor: pointer;
        padding: 6px 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--transition),
          color var(--transition);
      }

      .btn-hamburger:hover {
        background: var(--surface2);
        color: var(--text);
      }

      .btn-hamburger svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
      }

      .btn-mobile-new {
        background: none;
        border: 1px solid var(--border-mid);
        border-radius: var(--radius-sm);
        color: var(--text-2);
        cursor: pointer;
        padding: 6px 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: inherit;
        font-size: 0.74rem;
        font-weight: 500;
        transition:
          background var(--transition),
          color var(--transition);
      }

      .btn-mobile-new:hover {
        background: var(--surface2);
        color: var(--text);
      }

      .btn-mobile-new svg {
        width: 13px;
        height: 13px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
      }

      /* ── Mobile sidebar overlay ── */
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 190;
        backdrop-filter: blur(2px);
      }

      .sidebar-overlay.visible {
        display: block;
      }

      /* ════════════════════════════
       MAIN CONTENT
    ════════════════════════════ */
      .main {
        flex: 1;
        margin-left: var(--sidebar-w);
        display: flex;
        flex-direction: column;
        min-width: 0;
        position: relative;
        z-index: 1;
        height: 100vh;
      }

      .chat-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 40px 16px 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .chat-scroll::-webkit-scrollbar {
        width: 3px;
      }
      .chat-scroll::-webkit-scrollbar-thumb {
        background: var(--surface3);
        border-radius: 3px;
      }

      /* ── Welcome ── */
      .welcome {
        width: 100%;
        max-width: var(--chat-max);
        padding: 52px 0 48px;
        text-align: center;
        animation: fadeUp 0.45s ease both;
      }

      .welcome-icon {
        width: 56px;
        height: 56px;
        border-radius: 17px;
        background: linear-gradient(
          135deg,
          #7c3aed 0%,
          #6366f1 55%,
          #3b82f6 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 22px;
        box-shadow:
          0 0 32px rgba(124, 58, 237, 0.28),
          0 0 0 1px rgba(124, 58, 237, 0.18);
      }

      .welcome-icon svg {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: #fff;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .welcome h1 {
        font-size: clamp(1.6rem, 3.8vw, 2.1rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1.15;
        margin-bottom: 12px;
      }

      .welcome h1 em {
        font-style: normal;
        background: linear-gradient(
          90deg,
          #c4b5fd 0%,
          #a5b4fc 45%,
          #7dd3fc 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .welcome-sub {
        font-size: 0.88rem;
        color: var(--text-2);
        line-height: 1.65;
        max-width: 400px;
        margin: 0 auto 32px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        max-width: 520px;
        margin: 0 auto;
      }

      .chip {
        padding: 7px 14px;
        border-radius: 99px;
        border: 1px solid var(--border-mid);
        background: var(--surface);
        color: var(--text-2);
        font-family: inherit;
        font-size: 0.78rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background var(--transition),
          border-color var(--transition),
          color var(--transition),
          transform var(--transition);
      }

      .chip:hover {
        background: var(--surface2);
        border-color: var(--accent-line);
        color: var(--p1);
        transform: translateY(-1px);
      }

      /* ── Message rows ── */
      .message-row {
        width: 100%;
        max-width: var(--chat-max);
        margin-bottom: 4px;
        animation: fadeUp 0.25s ease both;
      }

      .msg-user {
        display: flex;
        justify-content: flex-end;
        padding: 4px 0;
      }

      .msg-user-bubble {
        background: var(--surface2);
        border: 1px solid var(--border-mid);
        border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
        padding: 11px 15px;
        max-width: 78%;
        font-size: 0.9rem;
        color: var(--text);
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg-ai {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 4px 0;
      }

      .ai-avatar {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, #7c3aed, #6366f1, #3b82f6);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 2px;
        box-shadow: 0 0 10px rgba(124, 58, 237, 0.22);
      }

      .ai-avatar svg {
        width: 13px;
        height: 13px;
        fill: none;
        stroke: #fff;
        stroke-width: 2.3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .ai-content {
        flex: 1;
        min-width: 0;
      }

      .ai-label {
        font-size: 0.67rem;
        font-weight: 600;
        color: var(--text-3);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      /* ── Markdown ── */
      .ai-response {
        font-size: 0.9rem;
        line-height: 1.75;
        color: var(--text);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .ai-response .md-h1 {
        font-size: 0.96rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
        margin-top: 16px;
        margin-bottom: 2px;
        padding: 10px 14px;
        background: var(--surface2);
        border: 1px solid var(--border-mid);
        border-left: 3px solid var(--p2);
        border-radius: var(--radius-md);
      }

      .ai-response .md-h1:first-child {
        margin-top: 0;
      }

      .ai-response .md-h2 {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--p1);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 16px;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .ai-response .md-h2::before {
        content: "";
        display: inline-block;
        width: 3px;
        height: 12px;
        background: linear-gradient(180deg, var(--p1), var(--p3));
        border-radius: 2px;
        flex-shrink: 0;
      }

      .ai-response .md-h2:first-child {
        margin-top: 0;
      }

      .ai-response .md-h3 {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-2);
        margin-top: 10px;
        margin-bottom: 2px;
      }

      .ai-response .md-h3:first-child {
        margin-top: 0;
      }

      .ai-response .md-p {
        margin: 0;
        color: var(--text);
        line-height: 1.75;
      }

      .ai-response .md-list {
        margin: 2px 0;
        padding-left: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .ai-response .md-list li {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        color: var(--text);
        font-size: 0.88rem;
        line-height: 1.65;
        padding: 5px 8px;
        border-radius: var(--radius-sm);
        transition: background var(--transition);
      }

      .ai-response .md-list li:hover {
        background: rgba(255, 255, 255, 0.022);
      }

      .ai-response ul.md-list li::before {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--p2);
        flex-shrink: 0;
        margin-top: 8px;
      }

      .ai-response ol.md-list {
        counter-reset: md-ol;
      }
      .ai-response ol.md-list li {
        counter-increment: md-ol;
      }

      .ai-response ol.md-list li::before {
        content: counter(md-ol);
        color: var(--p2);
        font-size: 0.68rem;
        font-weight: 700;
        background: rgba(129, 140, 248, 0.1);
        border: 1px solid rgba(129, 140, 248, 0.18);
        border-radius: 5px;
        min-width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 3px;
      }

      .ai-response strong {
        font-weight: 600;
        color: var(--text);
      }
      .ai-response em {
        font-style: italic;
        color: var(--text-2);
      }

      .ai-response .md-code {
        font-family: "Courier New", monospace;
        font-size: 0.82rem;
        background: var(--surface2);
        border: 1px solid var(--border-mid);
        border-radius: 4px;
        padding: 1px 6px;
        color: var(--p1);
      }

      .ai-response .md-hr {
        border: none;
        border-top: 1px solid var(--border-mid);
        margin: 8px 0;
        opacity: 0.5;
      }

      .ai-response .md-blockquote {
        border-left: 3px solid rgba(139, 92, 246, 0.5);
        margin: 2px 0;
        padding: 9px 14px;
        background: rgba(124, 58, 237, 0.06);
        border-radius: 0 var(--radius-md) var(--radius-md) 0;
        color: var(--text);
        font-size: 0.9rem;
        line-height: 1.65;
      }

      /* ── Thinking ── */
      .thinking {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 11px 14px;
        background: var(--surface);
        border: 1px solid var(--border-mid);
        border-radius: var(--radius-lg);
        width: fit-content;
      }

      .thinking-dots {
        display: flex;
        gap: 4px;

    <script>
      // ══════════════════════════════════════════════════════

      // ══════════════════════════════════════════════════════

      const STORAGE_KEY = "leyva_ai_sessions_v1";
      const MAX_SESSIONS = 40;

      let conversationHistory = [];
      let currentSessionId = null;

      /* ── Utils ── */
      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatDate(iso) {
        const diff = (Date.now() - new Date(iso)) / 1000;
        if (diff < 60) return "Ahora mismo";
        if (diff < 3600) return `Hace ${Math.floor(diff / 60)} min`;
        if (diff < 86400) return `Hace ${Math.floor(diff / 3600)} h`;
        return new Date(iso).toLocaleDateString("es-ES", {
          day: "numeric",
          month: "short",
        });
      }

      /* ── Markdown renderer ── */
      function inlineMd(text) {
        let s = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
        s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
        s = s.replace(/`(.+?)`/g, '<code class="md-code">$1</code>');
        return s;
      }

      function renderMarkdown(text) {
        const lines = text.split("\n");
        let html = "";
        let inUl = false,
          inOl = false;

        const closeList = () => {
          if (inUl) {
            html += "</ul>";
            inUl = false;
          }
          if (inOl) {
            html += "</ol>";
            inOl = false;
          }
        };

        for (const raw of lines) {
          const line = raw.trimEnd();

          if (/^---+$/.test(line.trim())) {
            closeList();
            html += '<hr class="md-hr"/>';
            continue;
          }
          if (line.startsWith("> ")) {
            closeList();
            html += `<div class="md-blockquote">${inlineMd(line.slice(2))}</div>`;
            continue;
          }
          if (line.startsWith("### ")) {
            closeList();
            html += `<div class="md-h3">${inlineMd(line.slice(4))}</div>`;
            continue;
          }
          if (line.startsWith("## ")) {
            closeList();
            html += `<div class="md-h2">${inlineMd(line.slice(3))}</div>`;
            continue;
          }
          if (line.startsWith("# ")) {
            closeList();
            html += `<div class="md-h1">${inlineMd(line.slice(2))}</div>`;
            continue;
          }

          const bullet = line.match(/^[-*+] (.+)/);
          if (bullet) {
            if (inOl) {
              html += "</ol>";
              inOl = false;
            }
            if (!inUl) {
              html += '<ul class="md-list">';
              inUl = true;
            }
            html += `<li>${inlineMd(bullet[1])}</li>`;
            continue;
          }

          const num = line.match(/^\d+\. (.+)/);
          if (num) {
            if (inUl) {
              html += "</ul>";
              inUl = false;
            }
            if (!inOl) {
              html += '<ol class="md-list">';
              inOl = true;
            }
            html += `<li>${inlineMd(num[1])}</li>`;
            continue;
          }

          closeList();
          if (!line.trim()) continue;
          html += `<p class="md-p">${inlineMd(line)}</p>`;
        }

        closeList();
        return html;
      }

      /* ── Textarea auto-resize ── */
      const chatInput = document.getElementById("chat-input");
      chatInput.addEventListener("input", () => {
        chatInput.style.height = "auto";
        chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + "px";
      });
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          enviar();
        }
      });
const dog = document.getElementById("dogMascot");
chatInput.addEventListener("input", () => {
  dog.style.display = chatInput.value.trim() ? "none" : "block";
});
chatInput.addEventListener("keydown", (e) => {

      /* ── Sidebar (mobile) ── */
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("sidebar-overlay").classList.toggle("visible");
      }

      function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebar-overlay").classList.remove("visible");
      }

      /* ── Sessions storage ── */
      function loadSessions() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        } catch {
          return [];
        }
      }

      function saveSessions(s) {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify(s.slice(0, MAX_SESSIONS)),
        );
      }

      function saveCurrentSession() {
        if (!conversationHistory.length) return;
        const sessions = loadSessions();
        const firstUser = conversationHistory.find((m) => m.role === "user");
        const title = firstUser
          ? firstUser.content.slice(0, 55)
          : "Conversación";
        const turns = conversationHistory.filter(
          (m) => m.role === "user",
        ).length;

        if (currentSessionId) {
          const idx = sessions.findIndex((s) => s.id === currentSessionId);
          if (idx !== -1) {
            sessions[idx] = {
              ...sessions[idx],
              title,
              turns,
              messages: conversationHistory,
              updated: new Date().toISOString(),
            };
            saveSessions(sessions);
            renderSidebar();
            return;
          }
        }

        currentSessionId = Date.now();
        sessions.unshift({
          id: currentSessionId,
          title,
          turns,
          messages: conversationHistory,
          date: new Date().toISOString(),
          updated: new Date().toISOString(),
        });
        saveSessions(sessions);
        renderSidebar();
      }

      function clearHistory() {
        if (!confirm("¿Borrar todo el historial de conversaciones?")) return;
        localStorage.removeItem(STORAGE_KEY);
        renderSidebar();
      }

      function renderSidebar() {
        const sessions = loadSessions();
        const list = document.getElementById("sidebar-list");

        if (!sessions.length) {
          list.innerHTML =
            '<div class="sidebar-empty">Empieza un chat y aparecerá aquí</div>';
          return;
        }

        list.innerHTML = sessions
          .map(
            (s) => `
        <div class="history-item ${s.id === currentSessionId ? "active" : ""}" onclick="loadSession(${s.id})">
          <div class="history-item-topic">${esc(s.title)}</div>
          <div class="history-item-date">${formatDate(s.updated || s.date)}</div>
        </div>
      `,
          )
          .join("");
      }

      function loadSession(id) {
        const sessions = loadSessions();
        const session = sessions.find((s) => s.id === id);
        if (!session) return;

        newChat(false);
        currentSessionId = id;
        conversationHistory = session.messages || [];

        hideWelcome();
        for (const msg of conversationHistory) {
          if (msg.role === "user") appendUserMsg(msg.content, false);
          else if (msg.role === "assistant")
            appendAiResponse(msg.content, false);
        }

        closeSidebar();
        scrollToBottom(false);
        renderSidebar();
      }

      /* ── UI helpers ── */
      function hideWelcome() {
        const w = document.getElementById("welcome");
        if (w) w.style.display = "none";
      }

      function scrollToBottom(smooth = true) {
        const el = document.getElementById("chat-scroll");
        el.scrollTo({
          top: el.scrollHeight,
          behavior: smooth ? "smooth" : "instant",
        });
      }

      function newChat(reset = true) {
        if (reset) {
          conversationHistory = [];
          currentSessionId = null;
        }
        document.getElementById("messages").innerHTML = "";
        const w = document.getElementById("welcome");
        if (w) w.style.display = "";
        chatInput.value = "";
        chatInput.style.height = "auto";
        chatInput.focus();
        renderSidebar();
        closeSidebar();
      }

      /* ── Append messages ── */
     function appendUserMsg(text, image = null, animate = true) {

  const row = document.createElement("div");
  row.className = "message-row";

  if (!animate) row.style.animation = "none";

  let imageHtml = "";

  if (image) {
    imageHtml = `
      <img src="${image}" 
           style="
           width:220px;
             max-width:220px;
             border-radius:16px;
             margin-bottom:10px;
             display:block;
           ">
    `;
  }

  row.innerHTML = `
   <div class="msg-user" style="display:flex; flex-direction:column; align-items:flex-end;">
      ${imageHtml}
      <div class="msg-user-bubble">${esc(text)}</div>
    </div>
  `;

  document.getElementById("messages").appendChild(row);

  if (animate) scrollToBottom();
}

      function appendThinking() {
        const row = document.createElement("div");
        row.className = "message-row";
        row.id = "thinking-row";
        row.innerHTML = `
        <div class="msg-ai">
          <div class="ai-avatar"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
          <div class="ai-content">
            <div class="ai-label">Leyva AI</div>
            <div class="thinking">
              <div class="thinking-dots"><span></span><span></span><span></span></div>
              <span class="thinking-text">Pensando…</span>
            </div>
          </div>
        </div>`;
        document.getElementById("messages").appendChild(row);
        scrollToBottom();
        return row;
      }

      function appendAiResponse(text, animate = true) {
        const row = document.createElement("div");
        row.className = "message-row";
        if (!animate) row.style.animation = "none";
        row.innerHTML = `
        <div class="msg-ai">
          <div class="ai-avatar"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
          <div class="ai-content">
            <div class="ai-label">Leyva AI</div>
            <div class="ai-response">${renderMarkdown(text)}</div>
            <div class="ai-actions">
              <button class="btn-copy-response" onclick='copiarRespuesta(this, ${JSON.stringify(text)})'>
                <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copiar
              </button>
            </div>
          </div>
        </div>`;
        document.getElementById("messages").appendChild(row);
        if (animate) scrollToBottom();
        return row;
      }

      function replaceThinkingWithResponse(thinkingRow, text) {
        const row = appendAiResponse(text);
        document.getElementById("messages").replaceChild(row, thinkingRow);
        scrollToBottom();
      }

      function replaceThinkingWithError(thinkingRow, msg) {
        const row = document.createElement("div");
        row.className = "message-row";
        row.innerHTML = `
        <div class="msg-ai">
          <div class="ai-avatar"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
          <div class="ai-content">
            <div class="ai-label">Leyva AI</div>
            <div class="error-msg">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <span>${esc(msg)}</span>
            </div>
          </div>
        </div>`;
        document.getElementById("messages").replaceChild(row, thinkingRow);
        scrollToBottom();
      }

      /* ── Copy ── */
      function copiarRespuesta(btn, texto) {
        navigator.clipboard.writeText(texto).then(() => {
          btn.classList.add("copied");

  function convertirImagenABase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;

    reader.readAsDataURL(file);
  });
}

        const thinkingRow = appendThinking();

        try {
          const res = await fetch(
            "https://ideas-virales--LeyvaQuintana.replit.app/generar",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
  messages: conversationHistory
 
              })
            }
          );

          const data = await res.json();
       const aiText = data?.respuesta;
          const errorApi = data?.error;

          if (aiText) {
            conversationHistory.push({ role: "assistant", content: aiText });
            replaceThinkingWithResponse(thinkingRow, aiText);
            saveCurrentSession();
          } else if (errorApi) {
            conversationHistory.pop();
            let msg;
            if (res.status === 401) msg = "API key inválida o expirada.";
            else if (res.status === 429)
              msg = "Límite de peticiones alcanzado. Espera un momento.";
            else msg = `Error (${res.status}): ${errorApi.message}`;
            replaceThinkingWithError(thinkingRow, msg);
          } else {
            conversationHistory.pop();
            replaceThinkingWithError(
              thinkingRow,
              "Respuesta inesperada. Inténtalo de nuevo.",
            );
          }
        } catch (e) {
          conversationHistory.pop();
          replaceThinkingWithError(
            thinkingRow,
            "Error de conexión: " + e.message,
          );
        } finally {
          btnSend.disabled = false;
          const sp = document.getElementById("spinner-send");
          if (sp) sp.remove();
          sendIcon.style.display = "";
          chatInput.focus();
